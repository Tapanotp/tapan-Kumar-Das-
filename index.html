<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tapan Virtual Reality</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{
background:#000;
color:white;
overflow:hidden;
}

/* Moving Background */
#particles-js{
position:fixed;
width:100%;
height:100%;
z-index:-1;
background:linear-gradient(135deg,#000428,#004e92);
}

/* Intro Screen */
#intro{
position:fixed;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
z-index:10;
}

#intro h1{
font-size:32px;
margin-bottom:20px;
text-shadow:0 0 20px #00f2ff;
animation:glow 2s infinite alternate;
}

.start-btn{
padding:14px 40px;
border:none;
border-radius:50px;
background:#00f2ff;
color:black;
font-weight:bold;
font-size:16px;
cursor:pointer;
transition:0.4s;
}

.start-btn:hover{
transform:scale(1.1);
box-shadow:0 0 25px #00f2ff;
}

/* Main App Content */
#app{
display:none;
padding:80px 20px;
text-align:center;
}

#app h2{
font-size:28px;
margin-bottom:20px;
text-shadow:0 0 15px #00f2ff;
}

.card-container{
display:flex;
flex-direction:column;
gap:20px;
margin-top:30px;
}

.card{
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:15px;
backdrop-filter:blur(10px);
transition:0.4s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 20px #00f2ff;
}

/* Animations */
@keyframes glow{
from{text-shadow:0 0 10px #00f2ff;}
to{text-shadow:0 0 30px #00f2ff;}
}
</style>
</head>
<body>

<div id="particles-js"></div>

<audio id="introSound" src="intro.mp3"></audio>

<!-- Intro Screen -->
<div id="intro">
<h1>Tapan Virtual Reality</h1>
<button class="start-btn" onclick="startApp()">PRESS START</button>
</div>

<!-- App Content -->
<div id="app">
<h2>Welcome Gamer 🎮</h2>
<p>Step Into The Virtual Universe</p>

<div class="card-container">
<div class="card">
<h3>🎮 VR Gaming</h3>
<p>High quality immersive gameplay.</p>
</div>

<div class="card">
<h3>🌌 360° Tours</h3>
<p>Interactive virtual world experience.</p>
</div>

<div class="card">
<h3>🚀 Metaverse Events</h3>
<p>Next level digital meetups & concerts.</p>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<script>
particlesJS("particles-js", {
"particles": {
"number": {"value": 70},
"size": {"value": 3},
"move": {"speed": 2},
"line_linked": {"enable": true},
"color": {"value": "#00f2ff"}
}
});

function startApp(){
document.getElementById("introSound").play();
document.getElementById("intro").style.display="none";
document.getElementById("app").style.display="block";
document.body.style.overflow="auto";
}
</script>

</body>
</html>index.html
