<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tapan Virtual Reality</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron', sans-serif;
scroll-behavior:smooth;
}

body{
background:#000;
color:white;
overflow-x:hidden;
perspective:1000px;
}

/* Animated Grid Background */
body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:radial-gradient(circle,#00f7ff33 1px, transparent 1px);
background-size:40px 40px;
animation:moveBg 20s linear infinite;
z-index:-1;
}

@keyframes moveBg{
0%{transform:translate(0,0);}
100%{transform:translate(-200px,-200px);}
}

/* Navbar */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:rgba(0,0,0,0.7);
position:fixed;
width:100%;
top:0;
z-index:1000;
}

nav h1{
color:#00f7ff;
}

nav ul{
display:flex;
gap:20px;
list-style:none;
}

nav ul li a{
color:white;
text-decoration:none;
font-size:14px;
}

nav ul li a:hover{
color:#00f7ff;
}

/* Hero */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h2{
font-size:45px;
color:#00f7ff;
text-shadow:0 0 25px #00f7ff;
margin-bottom:30px;
}

/* 3D Cube */
.cube-container{
width:200px;
height:200px;
position:relative;
transform-style:preserve-3d;
animation:rotateCube 8s infinite linear;
margin-bottom:30px;
}

@keyframes rotateCube{
0%{transform:rotateX(0deg) rotateY(0deg);}
100%{transform:rotateX(360deg) rotateY(360deg);}
}

.cube-face{
position:absolute;
width:200px;
height:200px;
background:rgba(0,247,255,0.2);
border:2px solid #00f7ff;
display:flex;
justify-content:center;
align-items:center;
font-weight:bold;
color:#00f7ff;
}

.front{ transform:rotateY(0deg) translateZ(100px);}
.back{ transform:rotateY(180deg) translateZ(100px);}
.right{ transform:rotateY(90deg) translateZ(100px);}
.left{ transform:rotateY(-90deg) translateZ(100px);}
.top{ transform:rotateX(90deg) translateZ(100px);}
.bottom{ transform:rotateX(-90deg) translateZ(100px);}

.btn{
padding:12px 30px;
border:none;
background:#00f7ff;
color:black;
font-weight:bold;
cursor:pointer;
border-radius:30px;
transition:0.4s;
}

.btn:hover{
transform:scale(1.1);
}

/* WhatsApp Button */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
font-size:22px;
text-decoration:none;
box-shadow:0 0 20px #25D366;
}

footer{
text-align:center;
padding:20px;
background:black;
margin-top:50px;
}
</style>
</head>

<body>

<nav>
<h1>Tapan VR</h1>
<ul>
<li><a href="#">Home</a></li>
<li><a href="#">Contact</a></li>
</ul>
</nav>

<section class="hero">
<h2>Welcome to Tapan Virtual Reality</h2>

<div class="cube-container">
<div class="cube-face front">VR</div>
<div class="cube-face back">360°</div>
<div class="cube-face right">Gaming</div>
<div class="cube-face left">Future</div>
<div class="cube-face top">3D</div>
<div class="cube-face bottom">Tech</div>
</div>

<button class="btn" onclick="sendWhatsApp()">Book Now</button>
</section>

<footer>
© 2026 Tapan Virtual Reality | All Rights Reserved
</footer>

<!-- WhatsApp Button -->
<a href="https://wa.me/919827058262?text=Hello%20Tapan%20Virtual%20Reality,%20I%20want%20to%20book%20a%20VR%20session." class="whatsapp">💬</a>

<script>
function sendWhatsApp(){
window.open("https://wa.me/919827058262?text=Hello%20Tapan%20Virtual%20Reality,%20I%20want%20to%20book%20a%20VR%20session.","_blank");
}
</script>

</body>
</html>
