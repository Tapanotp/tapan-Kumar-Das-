<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tapan Virtual Reality</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron', sans-serif;
}

body,html{
height:100%;
overflow-x:hidden;
color:white;
}

/* Background Video */
.video-bg{
position:fixed;
right:0;
bottom:0;
min-width:100%;
min-height:100%;
z-index:-2;
object-fit:cover;
}

/* Dark Overlay */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.65);
z-index:-1;
}

/* Navbar */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:rgba(0,0,0,0.6);
z-index:1000;
}

nav h1{
color:#00f7ff;
}

/* Hero Section */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero h2{
font-size:50px;
color:#00f7ff;
text-shadow:0 0 25px #00f7ff;
}

.hero p{
margin-top:20px;
max-width:600px;
}

.btn{
margin-top:30px;
padding:12px 35px;
border:none;
background:#00f7ff;
color:black;
font-weight:bold;
cursor:pointer;
border-radius:30px;
transition:0.4s;
}

.btn:hover{
transform:scale(1.1);
}

/* WhatsApp Button */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
font-size:22px;
text-decoration:none;
box-shadow:0 0 20px #25D366;
}

footer{
text-align:center;
padding:20px;
background:black;
}

@media(max-width:768px){
.hero h2{font-size:30px;}
}
</style>
</head>

<body>

<!-- ✅ Background Video -->
<video autoplay muted loop class="video-bg">
<source src="https://cdn.coverr.co/videos/coverr-man-using-vr-headset-5175/1080p.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<nav>
<h1>Tapan VR</h1>
</nav>

<section class="hero">
<h2>Welcome to Tapan Virtual Reality</h2>
<p>Experience next-level immersive VR Gaming & Entertainment like never before.</p>
<button class="btn" onclick="sendWhatsApp()">Book Now</button>
</section>

<footer>
© 2026 Tapan Virtual Reality | All Rights Reserved
</footer>

<!-- WhatsApp Button -->
<a href="https://wa.me/919827058262?text=Hello%20Tapan%20Virtual%20Reality,%20I%20want%20to%20book%20a%20VR%20session." class="whatsapp">💬</a>

<script>
function sendWhatsApp(){
window.open("https://wa.me/919827058262?text=Hello%20Tapan%20Virtual%20Reality,%20I%20want%20to%20book%20a%20VR%20session.","_blank");
}
</script>

</body>
</html>
