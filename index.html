<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tapan Virtual Reality</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron', sans-serif;
}

body,html{
height:100%;
overflow-x:hidden;
color:white;
scroll-behavior:smooth;
}

/* Background Video */
.video-bg{
position:fixed;
right:0;
bottom:0;
min-width:100%;
min-height:100%;
z-index:-2;
object-fit:cover;
}

/* Overlay */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.65);
z-index:-1;
}

/* Navbar */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:rgba(0,0,0,0.6);
z-index:1000;
}

nav h1{
color:#00f7ff;
}

/* Hero */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero h2{
font-size:50px;
color:#00f7ff;
text-shadow:0 0 25px #00f7ff;
}

/* Scroll Animation */
.reveal{
opacity:0;
transform:translateY(60px);
transition:all 1s ease;
}

.reveal.active{
opacity:1;
transform:translateY(0);
}

section{
padding:100px 20px;
text-align:center;
}

/* Button */
.btn{
margin-top:30px;
padding:12px 35px;
border:none;
background:#00f7ff;
color:black;
font-weight:bold;
cursor:pointer;
border-radius:30px;
transition:0.4s;
}

.btn:hover{
transform:scale(1.1);
}

/* Sound Button */
.sound-btn{
position:fixed;
bottom:90px;
right:20px;
background:#00f7ff;
color:black;
padding:12px;
border-radius:50%;
cursor:pointer;
font-weight:bold;
}

/* WhatsApp */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
font-size:22px;
text-decoration:none;
}

footer{
text-align:center;
padding:20px;
background:black;
}
</style>
</head>

<body>

<!-- Background Video -->
<video autoplay muted loop class="video-bg">
<source src="https://cdn.coverr.co/videos/coverr-man-using-vr-headset-5175/1080p.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<nav>
<h1>Tapan VR</h1>
</nav>

<section class="hero reveal">
<h2>Welcome to Tapan Virtual Reality</h2>
<p>Experience next-level immersive VR Gaming & Entertainment.</p>
<button class="btn" onclick="sendWhatsApp()">Book Now</button>
</section>

<section class="reveal">
<h2>Why Choose Us?</h2>
<p>High-end VR systems, multiplayer gaming, education & event setup.</p>
</section>

<footer>
© 2026 Tapan Virtual Reality | All Rights Reserved
</footer>

<!-- Background Sound -->
<audio id="bgSound" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_5d4d6b3c3e.mp3" type="audio/mpeg">
</audio>

<div class="sound-btn" onclick="toggleSound()">🔊</div>

<!-- WhatsApp -->
<a href="https://wa.me/919827058262?text=Hello%20Tapan%20Virtual%20Reality,%20I%20want%20to%20book%20a%20VR%20session." class="whatsapp">💬</a>

<script>
function sendWhatsApp(){
window.open("https://wa.me/919827058262?text=Hello%20Tapan%20Virtual%20Reality,%20I%20want%20to%20book%20a%20VR%20session.","_blank");
}

/* Scroll Animation */
function reveal(){
var reveals=document.querySelectorAll(".reveal");
for(var i=0;i<reveals.length;i++){
var windowHeight=window.innerHeight;
var elementTop=reveals[i].getBoundingClientRect().top;
if(elementTop<windowHeight-100){
reveals[i].classList.add("active");
}
}
}
window.addEventListener("scroll",reveal);

/* Sound Toggle */
var sound=document.getElementById("bgSound");
function toggleSound(){
if(sound.paused){
sound.play();
}else{
sound.pause();
}
}
</script>

</body>
</html>
