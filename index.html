<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tapan Virtual Reality</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron', sans-serif;
scroll-behavior:smooth;
}

body{
background:#000;
color:white;
overflow-x:hidden;
}

/* 3D Animated Background */
body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:radial-gradient(circle,#00f7ff33 1px, transparent 1px);
background-size:40px 40px;
animation:moveBg 20s linear infinite;
z-index:-1;
}

@keyframes moveBg{
0%{transform:translate(0,0);}
100%{transform:translate(-200px,-200px);}
}

/* Navbar */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(15px);
position:fixed;
width:100%;
top:0;
z-index:1000;
}

nav h1{
color:#00f7ff;
}

/* Hero */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero img{
width:300px;
max-width:90%;
border-radius:20px;
margin-bottom:30px;
box-shadow:0 0 40px #00f7ff;
animation:floatImg 4s ease-in-out infinite;
}

@keyframes floatImg{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-20px);}
}

.hero h2{
font-size:45px;
color:#00f7ff;
text-shadow:0 0 25px #00f7ff;
}

.hero p{
margin-top:20px;
max-width:600px;
}

.btn{
margin-top:30px;
padding:12px 35px;
border:none;
background:#00f7ff;
color:black;
font-weight:bold;
cursor:pointer;
border-radius:30px;
transition:0.4s;
}

.btn:hover{
transform:scale(1.1);
}

/* WhatsApp Button */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
font-size:22px;
text-decoration:none;
box-shadow:0 0 20px #25D366;
}

footer{
text-align:center;
padding:20px;
background:black;
margin-top:50px;
}
</style>
</head>

<body>

<nav>
<h1>Tapan VR</h1>
</nav>

<section class="hero">

<!-- ✅ VR Image Added -->
<img src="https://images.unsplash.com/photo-1593508512255-86ab42a8e620" alt="VR Gaming">

<h2>Welcome to Tapan Virtual Reality</h2>
<p>Experience next-level immersive VR Gaming & Entertainment like never before.</p>

<button class="btn" onclick="sendWhatsApp()">Book Now</button>

</section>

<footer>
© 2026 Tapan Virtual Reality | All Rights Reserved
</footer>

<!-- WhatsApp Floating Button -->
<a href="https://wa.me/917605908862?text=Hello%20Tapan%20Virtual%20Reality,%20I%20want%20to%20book%20a%20VR%20session." class="whatsapp">💬</a>

<script>
function sendWhatsApp(){
window.open("https://wa.me/917605908862?text=Hello%20Tapan%20Virtual%20Reality,%20I%20want%20to%20book%20a%20VR%20session.","_blank");
}
</script>

</body>
</html>
