<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Local Boy Gas Agency</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif;}

body{
background:#0a0a12;
color:white;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.container{
padding:20px;
text-align:center;
display:none;
}

.active{display:block;}

h1{
color:#00f2ff;
text-shadow:0 0 20px #00f2ff;
margin-bottom:5px;
}

.owner{
font-size:14px;
color:#00ffcc;
}

.emergency{
font-size:13px;
color:#ff4d4d;
margin-bottom:10px;
}

.card{
background:#111122;
padding:20px;
border-radius:15px;
box-shadow:0 0 25px #00f2ff55;
margin-top:15px;
}

input,select{
width:100%;
padding:10px;
margin:8px 0;
border-radius:8px;
border:none;
}

button{
padding:10px;
border:none;
border-radius:8px;
background:#00f2ff;
color:black;
font-weight:bold;
cursor:pointer;
margin-top:8px;
width:100%;
}

.price{
font-size:40px;
font-weight:900;
color:#00ffcc;
margin:15px 0;
text-shadow:0 0 20px #00ffcc;
}

.stock{
font-size:18px;
margin-top:5px;
font-weight:bold;
}

.link{
margin-top:15px;
color:#00f2ff;
cursor:pointer;
}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<!-- USER PAGE -->
<div id="user" class="container active">
<h1>Local Boy Gas Agency</h1>
<div class="owner">Owner: Raghu Nath Bhanja</div>
<div class="emergency">Emergency: 9778745403</div>

<div class="card">

<div class="price">₹<span id="livePrice">0</span></div>
<div id="stockStatus" class="stock"></div>

<input id="name" placeholder="Customer Name">
<input id="mobile" placeholder="Customer Mobile Number">
<input id="consumer" placeholder="Consumer Number">

<select id="payment">
<option value="COD">Cash on Delivery</option>
<option value="UPI">Online UPI Payment</option>
</select>

<button onclick="book()">Book Now</button>
<p id="msg"></p>

</div>

<div class="link" onclick="showAdminLogin()">Admin Panel</div>
</div>

<!-- ADMIN LOGIN -->
<div id="adminLogin" class="container">
<h1>Admin Login</h1>

<div class="card">
<input id="adminUser" placeholder="Username">
<input type="password" id="adminPass" placeholder="Password">
<button onclick="adminLogin()">Login</button>
</div>

<div class="link" onclick="showUser()">Back</div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="container">
<h1>Admin Panel</h1>

<div class="card">
<h3>Update Cylinder Price</h3>
<input id="newPrice" placeholder="Enter New Price">
<button onclick="changePrice()">Update Price</button>

<h3 style="margin-top:15px;">Update Stock</h3>
<input id="newStock" placeholder="Enter Stock Quantity">
<button onclick="changeStock()">Update Stock</button>
</div>

<div class="link" onclick="logout()">Logout</div>
</div>

<script>
let price = parseInt(localStorage.getItem("price")) || 950;
let stock = parseInt(localStorage.getItem("stock")) || 50;

animatePrice(0, price);
updateStockDisplay();

/* Animated Price */
function animatePrice(start, target){
let duration = 800;
let startTime = null;

function animation(currentTime){
if(!startTime) startTime = currentTime;
let progress = currentTime - startTime;
let percent = Math.min(progress / duration, 1);
let value = Math.floor(percent * (target - start) + start);
document.getElementById("livePrice").innerText = value;

if(percent < 1){
requestAnimationFrame(animation);
}
}
requestAnimationFrame(animation);
}

/* Update Price */
function changePrice(){
let newP = document.getElementById("newPrice").value;
if(newP){
let oldPrice = price;
price = parseInt(newP);
localStorage.setItem("price",price);
animatePrice(oldPrice, price);
alert("Price Updated Successfully");
}
}

/* Update Stock */
function changeStock(){
let newS = document.getElementById("newStock").value;
if(newS){
stock = parseInt(newS);
localStorage.setItem("stock",stock);
updateStockDisplay();
alert("Stock Updated Successfully");
}
}

function updateStockDisplay(){
let stockDiv = document.getElementById("stockStatus");

if(stock > 0){
stockDiv.innerHTML = "Stock Available: " + stock + " Cylinders ✅";
stockDiv.style.color = "#00ff99";
}else{
stockDiv.innerHTML = "Not Available ❌";
stockDiv.style.color = "red";
}
}

/* Booking */
function book(){
if(stock <= 0){
alert("Stock Not Available");
return;
}

let name=document.getElementById("name").value;
let mobile=document.getElementById("mobile").value;
let consumer=document.getElementById("consumer").value;
let payment=document.getElementById("payment").value;

if(!name || !mobile){
alert("Please fill all details");
return;
}

let id="LB"+Math.floor(Math.random()*100000);

let message=`New Gas Booking
ID: ${id}
Name: ${name}
Mobile: ${mobile}
Consumer No: ${consumer}
Payment: ${payment}
Amount: ₹${price}`;

window.open(`https://wa.me/919778745403?text=${encodeURIComponent(message)}`);

stock--;
localStorage.setItem("stock",stock);
updateStockDisplay();

document.getElementById("msg").innerHTML="Booking ID: "+id;
}

/* Admin Navigation */
function showAdminLogin(){
document.getElementById("user").classList.remove("active");
document.getElementById("adminLogin").classList.add("active");
}

function adminLogin(){
let user=document.getElementById("adminUser").value;
let pass=document.getElementById("adminPass").value;

if(user==="Raghu" && pass==="Tapan@8260"){
document.getElementById("adminLogin").classList.remove("active");
document.getElementById("adminPanel").classList.add("active");
}else{
alert("Wrong Username or Password");
}
}

function logout(){
document.getElementById("adminPanel").classList.remove("active");
document.getElementById("user").classList.add("active");
}

function showUser(){
document.getElementById("adminLogin").classList.remove("active");
document.getElementById("user").classList.add("active");
}

/* Background Particles */
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

let particles=[];
for(let i=0;i<80;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
dx:(Math.random()-0.5),
dy:(Math.random()-0.5)
});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="#00f2ff";
particles.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();
p.x+=p.dx;
p.y+=p.dy;
if(p.x<0||p.x>canvas.width)p.dx*=-1;
if(p.y<0||p.y>canvas.height)p.dy*=-1;
});
requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
